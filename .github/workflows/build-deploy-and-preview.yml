name: Build, Deploy to GitHub Pages and Deploy PR Preview

on:
  push:
    branches: [main, master]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency: ci-${{ github.ref }}

jobs:
  build-deploy-and-preview:
    name: Build, Deploy to GitHub Pages and Deploy PR Preview
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: version1

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.13.1

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build the Svelte application
      - name: Build Svelte app
        run: npm run build

      # Deploy to GitHub Pages (for pushes to main/master)
      - name: Deploy to GitHub Pages
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build # Adjust this if your build output directory differs

      # Deploy PR Preview
      - name: Deploy PR Preview
        if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./version1/build # Adjust this if your build output directory differs
