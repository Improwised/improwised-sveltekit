name: Deploy PR Previews for Astro App

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.13.1

      # Install dependencies and build Astro app
      - name: Install and build Astro app
        run: |
          cd webapp
          npm install
          npm run build

      # Deploy to PR Preview
      - name: Deploy PR Preview
        uses: withastro/action@v3
        with:
          path: ./webapp
          node-version: 22.0.0
          deploy-token: ${{ secrets.GITHUB_TOKEN }}
